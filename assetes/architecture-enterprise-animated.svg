<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura Enterprise ERP animada</title>
  <desc id="desc">Diagrama animado mostrando fluxo do front-end Angular para APIs .NET, serviços, banco MongoDB, cache Redis, AWS S3, CloudFront, gRPC e integrações fiscais.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#07142D"/>
      <stop offset="1" stop-color="#0B1026"/>
    </linearGradient>

    <linearGradient id="primary" x1="80" y1="80" x2="1120" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>

    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#6366F1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.53  0 0 0 0 1  0 0 0 0.7 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38BDF8" flood-opacity="0.18"/>
    </filter>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#334155" stroke-width="0.7" opacity="0.18"/>
    </pattern>

    <path id="p-ui-api" d="M 270 165 C 365 165 384 222 470 222"/>
    <path id="p-api-ui" d="M 470 242 C 382 242 365 190 270 190"/>
    <path id="p-api-services" d="M 635 258 C 635 306 520 307 520 356"/>
    <path id="p-api-fiscal" d="M 710 258 C 815 280 835 330 920 354"/>
    <path id="p-services-db" d="M 480 408 C 380 455 310 470 215 515"/>
    <path id="p-services-cache" d="M 545 408 C 560 452 600 472 610 515"/>
    <path id="p-services-s3" d="M 620 408 C 720 460 805 472 920 515"/>
    <path id="p-jobs" d="M 750 410 C 850 432 940 420 1030 405"/>
  </defs>

  <style>
    .title { font: 800 34px 'Segoe UI', Ubuntu, sans-serif; fill: #F8FAFC; letter-spacing: -0.6px; }
    .subtitle { font: 500 15px 'Segoe UI', Ubuntu, sans-serif; fill: #94A3B8; }
    .label { font: 800 13px 'Segoe UI', Ubuntu, sans-serif; fill: #E2E8F0; letter-spacing: .6px; }
    .node-title { font: 800 18px 'Segoe UI', Ubuntu, sans-serif; fill: #FFFFFF; }
    .node-text { font: 500 12.5px 'Segoe UI', Ubuntu, sans-serif; fill: #CBD5E1; }
    .tiny { font: 700 11px 'Segoe UI', Ubuntu, sans-serif; fill: #94A3B8; }
    .pill { font: 700 11px 'Segoe UI', Ubuntu, sans-serif; fill: #C4B5FD; }
    .path { stroke: url(#primary); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 9 13; filter: url(#glow); opacity: .82; }
    .path2 { stroke: #22D3EE; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 4 10; opacity: .52; }
    .packet { filter: url(#glow); }
    .card { fill: rgba(15, 23, 42, 0.86); stroke: rgba(148, 163, 184, 0.28); stroke-width: 1.2; filter: url(#softShadow); }
    .card-primary { stroke: rgba(96, 165, 250, 0.55); filter: url(#cardGlow); }
    .muted-card { fill: rgba(15, 23, 42, 0.62); stroke: rgba(148, 163, 184, 0.22); }
    .pulse { transform-origin: center; animation: pulse 2.5s ease-in-out infinite; }
    .float { animation: float 5s ease-in-out infinite; }
    .dash { animation: dash 18s linear infinite; }
    .dash-fast { animation: dash 10s linear infinite; }
    .blink { animation: blink 1.45s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -420; } }
    @keyframes pulse { 0%,100% { opacity:.75; transform: scale(1); } 50% { opacity:1; transform: scale(1.06); } }
    @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    @keyframes blink { 0%,100% { opacity:.35; } 50% { opacity:1; } }
  </style>

  <rect width="1200" height="640" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="638" rx="25" stroke="url(#primary)" stroke-opacity="0.55"/>
  <rect width="1200" height="640" rx="26" fill="url(#grid)"/>

  <circle cx="95" cy="86" r="180" fill="url(#orb)" opacity="0.35"/>
  <circle cx="1085" cy="560" r="250" fill="url(#orb)" opacity="0.22"/>

  <g class="blink">
    <circle cx="104" cy="82" r="3" fill="#60A5FA"/>
    <circle cx="129" cy="82" r="3" fill="#A855F7"/>
    <circle cx="154" cy="82" r="3" fill="#22D3EE"/>
    <circle cx="104" cy="108" r="3" fill="#22D3EE"/>
    <circle cx="129" cy="108" r="3" fill="#60A5FA"/>
    <circle cx="154" cy="108" r="3" fill="#A855F7"/>
  </g>

  <text x="70" y="64" class="title">Arquitetura Enterprise ERP</text>
  <text x="72" y="92" class="subtitle">Fluxo real de produto: UI reutilizável → APIs .NET → serviços → dados, cache, arquivos e integrações fiscais</text>

  <g transform="translate(815 42)">
    <rect width="310" height="46" rx="14" fill="rgba(15,23,42,.72)" stroke="rgba(34,211,238,.35)"/>
    <circle cx="26" cy="23" r="7" fill="#22C55E" class="pulse"/>
    <text x="43" y="28" class="tiny">Clean Architecture · DTOs · Performance</text>
  </g>

  <!-- layer labels -->
  <g opacity="0.95">
    <rect x="72" y="128" width="116" height="28" rx="14" fill="rgba(37,99,235,.18)" stroke="rgba(96,165,250,.35)"/>
    <text x="92" y="147" class="label">FRONT-END</text>
    <rect x="480" y="128" width="92" height="28" rx="14" fill="rgba(124,58,237,.18)" stroke="rgba(168,85,247,.35)"/>
    <text x="504" y="147" class="label">API</text>
    <rect x="430" y="318" width="140" height="28" rx="14" fill="rgba(16,185,129,.15)" stroke="rgba(52,211,153,.35)"/>
    <text x="453" y="337" class="label">SERVIÇOS</text>
    <rect x="90" y="474" width="167" height="28" rx="14" fill="rgba(251,191,36,.14)" stroke="rgba(251,191,36,.35)"/>
    <text x="112" y="493" class="label">DADOS / CACHE</text>
    <rect x="874" y="318" width="190" height="28" rx="14" fill="rgba(236,72,153,.14)" stroke="rgba(244,114,182,.35)"/>
    <text x="898" y="337" class="label">INTEGRAÇÕES</text>
  </g>

  <!-- Cards -->
  <g class="float">
    <rect x="78" y="162" width="214" height="112" rx="18" class="card card-primary"/>
    <circle cx="116" cy="202" r="22" fill="rgba(34,211,238,.13)" stroke="#22D3EE"/>
    <text x="108" y="209" font-family="Segoe UI, Ubuntu, sans-serif" font-size="20" font-weight="800" fill="#22D3EE">A</text>
    <text x="150" y="197" class="node-title">Angular V3</text>
    <text x="150" y="220" class="node-text">BaseList · BaseEdit</text>
    <text x="150" y="240" class="node-text">BaseReport · ApiService</text>
    <rect x="104" y="248" width="160" height="20" rx="10" fill="rgba(34,211,238,.08)"/>
    <text x="124" y="263" class="pill">+280 telas reutilizáveis</text>
  </g>

  <g>
    <rect x="468" y="162" width="260" height="122" rx="20" class="card card-primary"/>
    <circle cx="512" cy="204" r="24" fill="rgba(99,102,241,.16)" stroke="#818CF8"/>
    <text x="498" y="212" font-family="Segoe UI, Ubuntu, sans-serif" font-size="22" font-weight="800" fill="#A5B4FC">{ }</text>
    <text x="552" y="196" class="node-title">ASP.NET Core API</text>
    <text x="552" y="220" class="node-text">Controllers · Middlewares</text>
    <text x="552" y="240" class="node-text">REST · SignalR · Auth</text>
    <rect x="552" y="251" width="138" height="20" rx="10" fill="rgba(99,102,241,.11)"/>
    <text x="568" y="266" class="pill">Request/Response DTOs</text>
  </g>

  <g>
    <rect x="410" y="354" width="270" height="92" rx="18" class="card"/>
    <circle cx="450" cy="398" r="20" fill="rgba(34,197,94,.13)" stroke="#34D399"/>
    <text x="441" y="405" font-family="Segoe UI, Ubuntu, sans-serif" font-size="20" font-weight="800" fill="#34D399">S</text>
    <text x="484" y="388" class="node-title">Service Layer</text>
    <text x="484" y="412" class="node-text">Regra de negócio no backend</text>
    <text x="484" y="432" class="node-text">Validação · Logs · Auditoria</text>
  </g>

  <g>
    <rect x="862" y="354" width="245" height="92" rx="18" class="card"/>
    <circle cx="904" cy="398" r="20" fill="rgba(244,114,182,.13)" stroke="#F472B6"/>
    <text x="894" y="405" font-family="Segoe UI, Ubuntu, sans-serif" font-size="20" font-weight="800" fill="#F472B6">ƒ</text>
    <text x="938" y="388" class="node-title">Fiscal / ACBr</text>
    <text x="938" y="412" class="node-text">NF-e · NFS-e · MDF-e</text>
    <text x="938" y="432" class="node-text">SEFAZ · Certificados</text>
  </g>

  <g>
    <rect x="86" y="520" width="204" height="74" rx="18" class="muted-card"/>
    <circle cx="122" cy="557" r="16" fill="rgba(34,197,94,.13)" stroke="#22C55E"/>
    <text x="145" y="550" class="node-title">MongoDB</text>
    <text x="145" y="572" class="node-text">Índices alinhados aos filtros</text>
  </g>

  <g>
    <rect x="512" y="520" width="190" height="74" rx="18" class="muted-card"/>
    <circle cx="548" cy="557" r="16" fill="rgba(239,68,68,.13)" stroke="#EF4444"/>
    <text x="570" y="550" class="node-title">Redis</text>
    <text x="570" y="572" class="node-text">Cache e performance</text>
  </g>

  <g>
    <rect x="812" y="520" width="244" height="74" rx="18" class="muted-card"/>
    <circle cx="850" cy="557" r="16" fill="rgba(251,191,36,.15)" stroke="#F59E0B"/>
    <text x="875" y="550" class="node-title">AWS S3 + CDN</text>
    <text x="875" y="572" class="node-text">Arquivos, CloudFront e deploy</text>
  </g>

  <g>
    <rect x="760" y="406" width="78" height="34" rx="17" fill="rgba(34,211,238,.08)" stroke="rgba(34,211,238,.35)"/>
    <text x="780" y="428" class="tiny">gRPC</text>
    <rect x="1024" y="276" width="95" height="34" rx="17" fill="rgba(168,85,247,.08)" stroke="rgba(168,85,247,.35)"/>
    <text x="1045" y="298" class="tiny">Jobs</text>
  </g>

  <!-- Paths -->
  <use href="#p-ui-api" class="path dash"/>
  <use href="#p-api-ui" class="path2 dash-fast"/>
  <use href="#p-api-services" class="path dash"/>
  <use href="#p-api-fiscal" class="path dash"/>
  <use href="#p-services-db" class="path dash"/>
  <use href="#p-services-cache" class="path dash"/>
  <use href="#p-services-s3" class="path dash"/>
  <use href="#p-jobs" class="path2 dash-fast"/>

  <!-- Moving packets -->
  <circle r="6" fill="#22D3EE" class="packet">
    <animateMotion dur="3.9s" repeatCount="indefinite" rotate="auto"><mpath href="#p-ui-api"/></animateMotion>
  </circle>
  <circle r="4.8" fill="#A78BFA" class="packet">
    <animateMotion dur="4.5s" begin="1.1s" repeatCount="indefinite" rotate="auto"><mpath href="#p-api-ui"/></animateMotion>
  </circle>
  <circle r="6" fill="#34D399" class="packet">
    <animateMotion dur="4.2s" begin=".4s" repeatCount="indefinite" rotate="auto"><mpath href="#p-api-services"/></animateMotion>
  </circle>
  <circle r="5.5" fill="#F472B6" class="packet">
    <animateMotion dur="4.8s" begin=".8s" repeatCount="indefinite" rotate="auto"><mpath href="#p-api-fiscal"/></animateMotion>
  </circle>
  <circle r="5.5" fill="#22C55E" class="packet">
    <animateMotion dur="5.2s" begin=".2s" repeatCount="indefinite" rotate="auto"><mpath href="#p-services-db"/></animateMotion>
  </circle>
  <circle r="5.5" fill="#EF4444" class="packet">
    <animateMotion dur="4.6s" begin="1.4s" repeatCount="indefinite" rotate="auto"><mpath href="#p-services-cache"/></animateMotion>
  </circle>
  <circle r="5.5" fill="#F59E0B" class="packet">
    <animateMotion dur="5s" begin=".9s" repeatCount="indefinite" rotate="auto"><mpath href="#p-services-s3"/></animateMotion>
  </circle>

  <!-- Status panel -->
  <g transform="translate(770 132)">
    <rect width="340" height="138" rx="18" fill="rgba(2,6,23,.72)" stroke="rgba(148,163,184,.26)"/>
    <circle cx="26" cy="28" r="6" fill="#EF4444"/>
    <circle cx="46" cy="28" r="6" fill="#F59E0B"/>
    <circle cx="66" cy="28" r="6" fill="#22C55E"/>
    <text x="24" y="66" font-family="Fira Code, Consolas, monospace" font-size="13" fill="#FBBF24">pipeline.status</text>
    <text x="24" y="92" font-family="Fira Code, Consolas, monospace" font-size="13" fill="#93C5FD">deploy: homolog → produção</text>
    <text x="24" y="118" font-family="Fira Code, Consolas, monospace" font-size="13" fill="#86EFAC">review: regressão + performance</text>
  </g>

  <!-- footer chips -->
  <g transform="translate(70 606)">
    <rect width="1060" height="1" fill="url(#primary)" opacity="0.45"/>
    <circle cx="12" cy="16" r="4" fill="#22C55E" class="pulse"/>
    <text x="26" y="20" class="tiny">Controller → Service → Repository</text>
    <circle cx="264" cy="16" r="4" fill="#60A5FA" class="pulse"/>
    <text x="278" y="20" class="tiny">DTOs dedicados</text>
    <circle cx="456" cy="16" r="4" fill="#A855F7" class="pulse"/>
    <text x="470" y="20" class="tiny">Componentes base reutilizáveis</text>
    <circle cx="758" cy="16" r="4" fill="#F59E0B" class="pulse"/>
    <text x="772" y="20" class="tiny">Índices MongoDB por filtro real</text>
  </g>
</svg>
